coverage:
  status:
    project:
      default:
        target: auto
        threshold: 5%
        informational: true
    patch:
      default:
        target: 0%
        informational: true

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: true

ignore:
  - "**/tests/**"
  - "**/test_utils/**"
  - "**/test_utils.rs"
  - "**/examples/**"
