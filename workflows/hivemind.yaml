name: hivemind
description: Three planning agents brainstorm in parallel, then a coordinator synthesizes their ideas into a unified plan.

config:
  repo: "${FRIDI_REPO}"

triggers:
  - type: manual

steps:
  - name: architect
    agent: planner
    prompt: "You are the Architect. Analyze the technical feasibility and propose a system design. Focus on components, data flow, and integration points."
    outputs:
      - design

  - name: strategist
    agent: planner
    prompt: "You are the Strategist. Analyze the business impact, prioritize features by ROI, and identify risks. Focus on what to build first and why."
    outputs:
      - strategy

  - name: devil
    agent: planner
    prompt: "You are the Devil's Advocate. Challenge every assumption, find edge cases, and identify what could go wrong. Be constructively critical."
    outputs:
      - critique

  - name: synthesizer
    agent: planner
    prompt: "You are the Synthesizer. Review the Architect's design, Strategist's priorities, and Devil's Advocate critique. Produce a unified plan that addresses all perspectives."
    depends_on:
      - architect
      - strategist
      - devil
    outputs:
      - plan

  - name: verdict
    agent: claude
    prompt: "Review the synthesized plan. Produce a final go/no-go recommendation with concrete next steps."
    depends_on:
      - synthesizer
